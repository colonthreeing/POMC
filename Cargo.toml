[package]
name = "ferrite"
version = "0.1.0"
edition = "2021"

[dependencies]
wgpu = "24"
winit = "0.30"
glam = "0.29"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
parking_lot = "0.12"
pollster = "0.4"
bytemuck = { version = "1", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
tokio = { version = "1", features = ["full"] }
azalea-protocol = { version = "0.15", features = ["connecting"] }
azalea-crypto = "0.15"
azalea-auth = "0.15"
azalea-entity = "0.15"
azalea-world = "0.15"
azalea-block = "0.15"
azalea-core = "0.15"
azalea-registry = "0.15"
uuid = { version = "1", features = ["v4"] }
crossbeam-channel = "0.5"
image = "0.25"
egui = "0.31"
egui-wgpu = "0.31"
egui-winit = "0.31"
