name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pomc.exe
            archive: pomc-client-windows-x64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pomc
            archive: pomc-client-linux-x64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pomc
            archive: pomc-client-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev cmake

      - name: Build client
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: client-${{ matrix.target }}
          path: ${{ matrix.archive }}

  build-launcher:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: launcher
        run: pnpm install

      - name: Build launcher
        working-directory: launcher
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Find launcher artifacts
        id: find
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "path=$(find launcher/src-tauri/target/${{ matrix.target }}/release/bundle/msi -name '*.msi' | head -1)" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "path=$(find launcher/src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name '*.AppImage' | head -1)" >> $GITHUB_OUTPUT
          else
            echo "path=$(find launcher/src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name '*.dmg' | head -1)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: launcher-${{ matrix.target }}
          path: ${{ steps.find.outputs.path }}

  release:
    needs: [build-client, build-launcher]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
